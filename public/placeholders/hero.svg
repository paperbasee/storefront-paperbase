<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="640" viewBox="0 0 1600 640" role="img" aria-label="Hero placeholder">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b3a6b;stop-opacity:0.35"/>
      <stop offset="45%" style="stop-color:#f4f6fa;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#f5a623;stop-opacity:0.25"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1b3a6b" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="100%" height="100%" fill="url(#bg)"/>
  <rect width="100%" height="100%" fill="url(#grid)"/>
  <text x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" fill="#1a1a2e" fill-opacity="0.35" font-family="system-ui,sans-serif" font-size="28" font-weight="600">Hero image placeholder</text>
</svg>
